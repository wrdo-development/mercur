# Medusa Cloud monorepo config.
# nodeLinker: node-modules — Medusa requires the traditional node_modules layout.
# nmHoistingLimits: none — hoist to the ROOT (single shared instances). This is
#   the opposite of Medusa's generic "workspaces" advice ON PURPOSE: under
#   "workspaces", each workspace got its own copy of @medusajs/core-flows (4
#   copies), and core-flows registers workflows as an import side effect → boot
#   crash "Workflow with id 'create-fulfillment-workflow' ... already exists"
#   (medusajs/medusa#11137, #14748). "none" collapses core-flows to ONE instance.
#   ts-node is declared at the ROOT (package.json devDeps) so the hoisted layout
#   still resolves it for `mercurjs start` loading medusa-config.ts.
#   Verified booting on VPS: HTTP 200 /health.
nodeLinker: node-modules
nmHoistingLimits: none

enableScripts: true
