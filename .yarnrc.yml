# Medusa Cloud monorepo requirements (docs.medusajs.com/cloud/projects/prerequisites):
# Medusa needs the traditional node_modules layout, and deps hoisted only to the
# workspace level to avoid cross-package conflicts in the monorepo. This is also
# what prevents the duplicate-@medusajs/framework-instance / configManager race
# that pnpm produced (pnpm is NOT supported for Medusa monorepos — Yarn is).
nodeLinker: node-modules
nmHoistingLimits: workspaces

enableScripts: true
